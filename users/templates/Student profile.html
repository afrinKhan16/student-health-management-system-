<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Information</title>
<style>
body { background: #e8dfd3; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
.container { background: #f5f5f5; width: 700px; border-radius: 25px; border: 3px solid black; padding: 20px 30px; }
h1 { text-align: center; font-size: 40px; margin-bottom: 20px; }
.row { display: flex; gap: 10px; margin-bottom: 15px; }
.box { border: 2px solid black; border-radius: 20px; padding: 10px; flex: 1; }
.photo { width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; }
input, textarea { width: 100%; border: none; outline: none; background: transparent; font-size: 14px; }
textarea { height: 100px; resize: none; }
.large-box { height: 120px; }
.btn-submit { background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; margin-top: 10px; display: block; width: 100%; }
.back-btn { text-align: center; display: block; margin-top: 15px; text-decoration: none; color: #333; }
</style>
</head>
<body>

<div class="container">
    <h1>Student Information</h1>
    
    {% if messages %}
        {% for message in messages %}
            <p style="color: green; text-align: center;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'register_patient' %}">
        {% csrf_token %}
        <div class="row">
            <div class="box photo">Photo</div>
            <div style="flex:2;">
                <div class="box"><input type="text" name="first_name" placeholder="Name"></div>
                <div class="box"><input type="text" name="last_name" placeholder="Surname"></div>
                <div class="box"><input type="date" name="dob" placeholder="Date of Birth"></div>
            </div>
        </div>

        <div class="row">
            <div class="box"><input type="text" name="fathers_name" placeholder="Father's Name"></div>
            <div class="box"><input type="text" name="mothers_name" placeholder="Mother's Name"></div>
        </div>

        <div class="row">
            <div class="box"><input type="text" name="address" placeholder="Address"></div>
        </div>

        <div class="row">
            <div class="box"><input type="text" name="emergency_contact" placeholder="Emergency Contact Person"></div>
            <div class="box"><input type="text" name="emergency_phone" placeholder="Emergency Telephone Number"></div>
        </div>

        <div class="row">
            <div class="box large-box">
                <textarea name="general_info" placeholder="General Information"></textarea>
            </div>
        </div>

        <div class="row">
            <div class="box large-box">
                <textarea name="health_info" placeholder="Health Information"></textarea>
            </div>
        </div>

        <button type="submit" class="btn-submit">Save Student Information</button>
        <a href="{% url 'dashboard' %}" class="back-btn">Back to Dashboard</a>
    </form>
</div>

</body>
</html>
