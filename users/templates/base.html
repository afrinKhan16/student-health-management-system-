<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Health Management System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Lighter background for better contrast */
        }
        .logo-font {
            font-family: 'Pacifico', cursive;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        /* Custom gradient for card borders or text if needed */
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #06b6d4, #3b82f6);
        }
    </style>
</head>
<body class="text-gray-800 antialiased font-sans flex flex-col min-h-screen">
    
    {% if user.is_authenticated %}
    <nav class="bg-gradient-to-r from-cyan-400 to-blue-500 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="{% url 'dashboard' %}" class="flex-shrink-0 flex items-center">
                        <i class="fas fa-heartbeat text-white text-3xl mr-3 shadow-sm rounded-full bg-white/20 p-2"></i>
                        <span class="text-white logo-font text-2xl tracking-wide drop-shadow-md">Student Health</span>
                    </a>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex flex-1 justify-center space-x-8">
                    <a href="{% url 'dashboard' %}" class="text-white/90 hover:text-white font-medium transition-colors">Home</a>
                    <!-- You can add more links here as needed -->
                    <!-- <a href="#" class="text-white/90 hover:text-white font-medium transition-colors">How It Works</a> -->
                    <!-- <a href="#" class="text-white/90 hover:text-white font-medium transition-colors">Contact Us</a> -->
                </div>
                
                <!-- User Nav -->
                <div class="hidden md:flex items-center space-x-6 border-l border-white/20 pl-6 lg:pl-8">
                    <div class="flex flex-col text-right">
                        <span class="text-white/90 text-sm font-medium leading-tight">Welcome,</span>
                        <span class="text-white font-bold leading-tight drop-shadow-sm">{{ user.username }}</span>
                    </div>
                    
                    <a href="{% url 'logout' %}" class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                        Logout
                    </a>
                </div>
                
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="flex-grow py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            {% if messages %}
                {% for message in messages %}
                <div class="mb-6 bg-{{ message.tags }}-100 border-l-4 border-{{ message.tags }}-500 text-{{ message.tags }}-800 p-4 rounded-r shadow-sm flex items-center" role="alert">
                    <i class="fas fa-info-circle mr-3"></i>
                    <p class="font-medium">{{ message }}</p>
                </div>
                {% endfor %}
            {% endif %}
            
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto shadow-inner">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <p class="text-sm text-gray-500">&copy; 2026 Student Health Management System.</p>
            <div class="flex space-x-4 text-gray-400">
                <i class="fab fa-facebook hover:text-blue-600 cursor-pointer"></i>
                <i class="fab fa-twitter hover:text-blue-400 cursor-pointer"></i>
                <i class="fas fa-envelope hover:text-red-500 cursor-pointer"></i>
            </div>
        </div>
    </footer>
</body>
</html>
